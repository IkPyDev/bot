name: Deploy bot

# main branch'ga har push bo'lganda ishlaydi
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # Actions sahifasidan qo'lda ham ishga tushirish mumkin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Serverga rsync + docker compose
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          SOURCE: "./"
          TARGET: "/home/ikpydev/bot/"
          # .env, loglar, data serverda saqlanadi — o'chirilmaydi/o'zgartirilmaydi
          EXCLUDE: "/.git/, /.github/, /.venv/, /logs/, /data/, /.env, /__pycache__/"
          ARGS: "-rlgoDzvc --delete"
          SCRIPT_AFTER: |
            cd ~/bot
            docker compose up -d --build
            docker image prune -f
            echo "✅ Deploy tugadi"
